<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Social Platform</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/components.css">
</head>

<body>
<div class="login-container">
    <div class="login-card">
        <h1>Create Account</h1>
        <p class="welcome-text">Join our social platform</p>
        <form id="registerForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
                <small id="usernameError" class="error-message"></small>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <small id="emailError" class="error-message"></small>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <small id="passwordError" class="error-message"></small>
                <small class="helper-text">Minimum 6 characters</small>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                <small id="confirmError" class="error-message"></small>
            </div>
            <button type="submit">Register</button>
        </form>
        <p class="signup-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>
</div>
<script src="JavaScript/utils.js"></script>
<script src="JavaScript/auth.js"></script>

<script>
   if (isLoggedIn()) {
    window.location.href = "feed.html";
  }
  const form = document.getElementById("registerForm");
  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    clearErrors();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    if (password !== confirm) {
      showError("confirmError", "Passwords do not match");
      return;
    }
    const result = await registerUser(username, email, password);
    if (result.success) {
      window.location.href = `feed.html?userId=${result.user.id}`;
    } else {
      const msg = result.message.toLowerCase();
      if (msg.includes("username")) showError("usernameError", result.message);
      else if (msg.includes("email")) showError("emailError", result.message);
      else if (msg.includes("password")) showError("passwordError", result.message);
      else showError("emailError", result.message);
    }
  });




    function clearErrors() {
        let ids = ["usernameError", "emailError", "passwordError", "confirmError"];
        for (let i = 0; i < ids.length; i++) {
            let el = document.getElementById(ids[i]);
            if (el) {
                el.textContent = "";
            }
        }
    }





    function showError(id, msg) {
        let el = document.getElementById(id);
        if (el) {
            el.textContent = msg;
        }
    }


    // real-time validation for password and confirm password while typing
    document.getElementById("username").addEventListener("input", function() {
        let r = validateUsername(this.value);

        if (!r.isValid && this.value) {
            showError("usernameError", r.message);
        } else {
            showError("usernameError", "");
        }
    });
    document.getElementById("email").addEventListener("input", function() {
        let r = validateEmail(this.value);

        if (!r.isValid && this.value) {
            showError("emailError", r.message);
        } else {
            showError("emailError", "");
        }
    });
    document.getElementById("password").addEventListener("input", function() {
        let r = validatePassword(this.value);

        if (!r.isValid && this.value) {
            showError("passwordError", r.message);
        } else {
            showError("passwordError", "");
        }
    });
    document.getElementById("confirmPassword").addEventListener("input", function() {
        let pass = document.getElementById("password").value;

        if (this.value != pass && this.value) {
            showError("confirmError", "Passwords do not match");
        } else {
            showError("confirmError", "");
        }
    });

</script>

</body>
</html>
