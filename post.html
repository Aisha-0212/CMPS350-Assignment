<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header>
        <h1>Social Synapse</h1>
        <nav>
            <a href="feed.html">Back to Feed</a>
        </nav>
    </header>

    <!-- Create Post -->
    <article class="create-post">
        <h2>Create a post</h2>
        <textarea id="post-input" placeholder="what's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*,video/*">
        <button id="create-post-btn">Share</button>
        
    </article>

    <!-- Post Card -->
    <article class="post">
        <!-- Create Post -->
        <section class="create-post">
            <!-- Post Header -->
            <section class="post-header">
                <p id="post-author-name"><strong></strong></p>
                <p id="post-timestamp"></p>
            </section>
            <!-- post content -->
            <p class="post-content"></p>
            <!-- post actions -->
            <section class="post-actions">
                <button id="like-btn">
                    <span id="like-heart">❤️</span>
                    <span id="like-count-btn">0</span>
                </button>
                <button id="delete-btn">Delete Post</button>

            </section>
        </section>

        <!-- comments -->
         
        <section class="comments">
            <h3>Comments</h3>
            <!-- existing comments -->
            <section class="existing-comments"></section>
            <!-- Add a comment -->
            <section class="add-comment">
                <input 
                type="text"
                id="comment-input"
                placeholder="Add a comment..."
                maxlength = "500">
                <button id="comment-btn">Post</button>
            </section>
            <p id="comment-message"></p>

        </section>
    </article>

    <script src="JavaScript/storage.js"></script>
    <script src="JavaScript/posts.js"></script>
</body>
</html>
