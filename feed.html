<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - Social Synapse</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/components.css">
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h1>Social Synapse</h1>
    <ul>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Main Layout -->
  <main>

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <p>Menu</p>
    </aside>

    <!-- Feed -->
    <section class="feed">

      <!-- Create Post -->
      <article class="create-post">
        <textarea id="post-input" placeholder="What's on your mind?"></textarea>
        <button id="create-post-btn">Share</button>
        <p id="post-error"></p>
      </article>

      <!-- Posts Container -->
      <section id="posts-container"></section>

    </section>

    <!-- Right Sidebar -->
    <aside class="sidebar">
      <p>Suggestions</p>
    </aside>

  </main>

  <script src="JavaScript/storage.js"></script>
  <script src="JavaScript/posts.js"></script>
  <script src="JavaScript/feed.js"></script>

</body>
