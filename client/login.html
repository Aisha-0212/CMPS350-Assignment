<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Social Platform</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/components.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>Welcome Back</h1>
        <p class="welcome-text">Log in to your account</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <small id="emailError" class="error-message"></small>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <small id="passwordError" class="error-message"></small>
            </div>
            <button type="submit">Login</button>
        </form>
        <p class="signup-text">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </div>
</div>

<script src="JavaScript/utils.js"></script>
<script src="JavaScript/auth.js"></script>
<script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", async function(e) {
    e.preventDefault();
    document.getElementById("emailError").textContent = "";
    document.getElementById("passwordError").textContent = "";
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) {
      document.getElementById("passwordError").textContent = "Email and password are required";
      return;
    }
    const result = await loginUser(email, password);
    if (result.success) {
      window.location.href = `feed.html?userId=${result.user.id}`;
    } else {
      const msg = result.message.toLowerCase();
      if (msg.includes("email") || msg.includes("account")) {
        document.getElementById("emailError").textContent = result.message;
      } else {
        document.getElementById("passwordError").textContent = result.message;
      }
    }
  });

</script>
</body>
</html>
