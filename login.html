<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Social Synapse</title>
  <link rel="stylesheet" href="CSS/loginStyle.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <h1>Social Synapse</h1>
      <p class="welcome-text">Welcome back! Please login to your account 🌸</p>

      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">

        <button type="submit">Login</button>
        <p id="login-error"></p>
      </form>

      <p class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const loginError = document.getElementById("login-error");

    loginForm.addEventListener("submit", e => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        loginError.textContent = "Both username and password are required!";
        return;
      }

      // مثال بسيط: تحقق وهمي
      if (username === "TestUser" && password === "1234") {
        loginError.textContent = "";
        alert("Login successful! Redirecting to Feed...");
        window.location.href = "feed.html"; 
      } else {
        loginError.textContent = "Invalid username or password!";
      }
    });
  </script>

</body>
</html>
