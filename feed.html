<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - Social Synapse</title>

  <!-- CSS -->

  <link rel="stylesheet" href="CSS/components.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/style.css">
</head>

<body>


  <!-- ===== Navbar ===== -->
  <nav class="navbar">
  <h1>Social Synapse</h1>
  <ul>
    <li><a href="login.html">Login</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="feed.html">Feed</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li><a href="index.html">Logout</a></li>
  </ul>
</nav>

  <!-- ===== Main Container ===== -->
  <main class="container">

    <!-- ===== Left Sidebar ===== -->
    <aside class="sidebar">
      <h3>Menu</h3>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Explore</a></li>
      </ul>
    </aside>

    <!-- ===== Feed Section ===== -->
    <section class="feed">

      <!-- ===== Create Post ===== -->
      <article class="create-post">
        <h2>Create Post</h2>
        <textarea id="post-input" placeholder="What's on your mind?"></textarea>
        <button id="create-post-btn">Share</button>
        <p id="post-error" style="color:red;"></p>
        
  <section class="post-header">
    <p><strong>TestUser</strong></p>
    <p class="post-timestamp">Wednesday, Mar 25, 2026, 06:30 PM</p> <!-- التاريخ ظاهر مباشرة -->
  </section>
  <p class="post-content">This is an example post 🌸</p>
  <section class="post-actions">
    <button class="like-btn" data-id="1">❤️ <span>0</span></button>
    <button class="delete-btn" data-id="1">🗑 Delete</button>
  </section>
  <section class="comments">
    <div class="existing-comments">
      <div class="comment"><strong>Friend</strong>: Nice post!</div>
    </div>
    <div class="add-comment">
      <input type="text" placeholder="Add comment..." data-id="1">
      <button class="comment-btn" data-id="1">Post</button>
    </div>
  </section>

      </article>

      <!-- ===== Posts Container ===== -->
      <section id="posts-container">
      
      </section>

    </section>
   

    <!-- ===== Right Sidebar ===== -->
    <aside class="sidebar">
      <h3>Suggestions</h3>
      <ul>
        <li><a href="#">Follow new users</a></li>
        <li><a href="#">Trending</a></li>
      </ul>
    </aside>

  </main>

  <!-- ===== JS ===== -->
  <script src="feed.js"></script>

</body>
</html>
